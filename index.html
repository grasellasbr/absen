<!-- BAGIAN HTML & CSS SAMA PERSIS PUNYA KAMU (TIDAK DIUBAH) -->
<!-- AKU HANYA UBAH BAGIAN SCRIPT -->

<script>
let foto = null;
let lat = null;
let lon = null;
let frozenTime = null;

// 📍 KOORDINAT KELAS
const kelasLat = -6.929684430614102;
const kelasLon = 107.7688228275042;
const radius = 0.0001;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const canvasImg = document.getElementById('canvas-img');
const btnSnap = document.getElementById('btn-snap');
const btnRetake = document.getElementById('btn-retake');
const liveIndicator = document.getElementById('live-indicator');

// =======================
// 📍 LOKASI
// =======================
navigator.geolocation.getCurrentPosition(
  pos => {
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;

    document.getElementById("input-lokasi").value =
      `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
  },
  err => {
    alert("❌ Lokasi tidak diizinkan");
  },
  {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  }
);

function validasiLokasi(lat, lon) {
  const jarakLat = Math.abs(lat - kelasLat);
  const jarakLon = Math.abs(lon - kelasLon);
  return jarakLat < radius && jarakLon < radius;
}

// =======================
// 📷 START CAMERA
// =======================
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });
    video.srcObject = stream;
  } catch (err) {
    alert("Izinkan akses kamera!");
  }
}

// =======================
// 📸 CEK FOTO GELAP
// =======================
function cekFotoValid(canvas) {
  const ctx = canvas.getContext("2d");
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

  let total = 0;
  for (let i = 0; i < data.length; i += 4) {
    total += data[i] + data[i+1] + data[i+2];
  }

  const avg = total / (data.length / 4) / 3;
  return avg > 40;
}

// =======================
// 📸 AMBIL FOTO
// =======================
btnSnap.addEventListener('click', () => {
  const context = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  context.drawImage(video, 0, 0);

  if (!cekFotoValid(canvas)) {
    alert("❌ Gambar/objek belum tertangkap!");
    return;
  }

  const data = canvas.toDataURL('image/png');
  canvasImg.src = data;
  foto = data;

  // freeze waktu
  frozenTime = new Date();

  video.style.display = 'none';
  canvasImg.style.display = 'block';
  liveIndicator.innerHTML = '<div class="dot" style="background:gray"></div> CAPTURED';

  // STOP UPDATE TIME
  stopClock = true;
});

// =======================
// 🔄 ULANG FOTO
// =======================
btnRetake.addEventListener('click', () => {
  video.style.display = 'block';
  canvasImg.style.display = 'none';
  liveIndicator.innerHTML = '<div class="dot"></div> LIVE PREVIEW';

  foto = null;
  frozenTime = null;
  stopClock = false;
});

// =======================
// ⏰ JAM
// =======================
let stopClock = false;

function updateTime() {
  if (stopClock && frozenTime) {
    const t = frozenTime;
    tampilkanWaktu(t);
    return;
  }

  const now = new Date();
  tampilkanWaktu(now);
}

function tampilkanWaktu(now) {
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  const seconds = String(now.getSeconds()).padStart(2, '0');

  document.getElementById('large-time').textContent = `${hours}:${minutes}`;

  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const day = String(now.getDate()).padStart(2, '0');
  const month = months[now.getMonth()];
  const year = now.getFullYear();

  document.getElementById('current-date-time').textContent =
    `${day} ${month} ${year} • ${hours}:${minutes}:${seconds} WIB`;
}

setInterval(updateTime, 1000);
updateTime();

// =======================
// ✅ ABSEN
// =======================
function absen() {
  const nama = document.getElementById("input-nama").value.trim();
  const nim = document.getElementById("input-nim").value.trim();

  if (!nama) {
    alert("❌ Nama belum diisi");
    return;
  }

  if (!nim) {
    alert("❌ NIM belum diisi");
    return;
  }

  if (!foto) {
    alert("❌ Ambil foto dulu");
    return;
  }

  if (!lat || !lon) {
    alert("❌ Lokasi belum tersedia");
    return;
  }

  if (!validasiLokasi(lat, lon)) {
    alert("❌ Kamu di luar area kelas");
    return;
  }

  alert("✅ Presensi berhasil!");
}

// hook tombol
document.querySelector(".btn-submit").addEventListener("click", absen);

startCamera();
</script>
