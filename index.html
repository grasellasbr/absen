<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presensi Kelas</title>

<style>
body { font-family: sans-serif; text-align: center; background:#f5f7fb; }
input, button { padding:10px; margin:5px; width:80%; }
video, img { width:300px; border-radius:12px; }
#status { margin-top:10px; font-weight:bold; }
</style>
</head>

<body>

<h2>PRESENSI KELAS</h2>

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="nim" placeholder="NIM">

<br>

<video id="video" autoplay></video>
<img id="hasil" style="display:none;">

<br>

<button onclick="ambilFoto()">📸 Ambil Foto</button>
<button onclick="ulangFoto()">🔄 Ulang</button>

<br>

<button onclick="absen()">✅ Tandai Hadir</button>

<p id="lokasi">📍 Mendeteksi lokasi...</p>
<p id="status"></p>

<script>
let foto = null;
let lat = null;
let lon = null;
let timestamp = null;

// 📍 KOORDINAT KELAS
const kelasLat = -6.929684430614102;
const kelasLon = 107.7688228275042;
const radius = 0.0001;

// =======================
// 📷 START CAMERA
// =======================
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("video").srcObject = stream;
});

// =======================
// 📸 CEK FOTO GELAP
// =======================
function cekFotoValid(canvas) {
  const ctx = canvas.getContext("2d");
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

  let total = 0;
  for (let i = 0; i < data.length; i += 4) {
    total += data[i] + data[i+1] + data[i+2];
  }

  const avg = total / (data.length / 4) / 3;

  return avg > 40; // kalau terlalu gelap → false
}

// =======================
// 📸 AMBIL FOTO
// =======================
function ambilFoto() {
  const video = document.getElementById("video");

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  if (!cekFotoValid(canvas)) {
    alert("❌ Gambar tidak valid / terlalu gelap!");
    return;
  }

  foto = canvas.toDataURL("image/png");

  document.getElementById("hasil").src = foto;
  document.getElementById("hasil").style.display = "block";
  video.style.display = "none";

  // 🧊 FREEZE WAKTU
  timestamp = new Date();

  document.getElementById("status").innerText =
    "📸 Foto berhasil diambil";
}

// =======================
// 🔄 ULANG FOTO
// =======================
function ulangFoto() {
  foto = null;
  document.getElementById("video").style.display = "block";
  document.getElementById("hasil").style.display = "none";

  timestamp = null;

  document.getElementById("status").innerText =
    "🔄 Silakan ambil ulang foto";
}

// =======================
// 📍 AMBIL LOKASI
// =======================
navigator.geolocation.getCurrentPosition(
  pos => {
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;

    document.getElementById("lokasi").innerText =
      `📍 ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
  },
  err => {
    document.getElementById("lokasi").innerText =
      "❌ Lokasi ditolak";
  },
  {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  }
);

// =======================
// 📍 VALIDASI LOKASI
// =======================
function validasiLokasi(lat, lon) {
  const jarakLat = Math.abs(lat - kelasLat);
  const jarakLon = Math.abs(lon - kelasLon);
  return jarakLat < radius && jarakLon < radius;
}

// =======================
// ✅ ABSEN
// =======================
function absen() {
  const nama = document.getElementById("nama").value.trim();
  const nim = document.getElementById("nim").value.trim();

  if (!nama) {
    alert("❌ Nama belum diisi");
    return;
  }

  if (!nim) {
    alert("❌ NIM belum diisi");
    return;
  }

  if (!foto) {
    alert("❌ Ambil foto dulu");
    return;
  }

  if (!lat || !lon) {
    alert("❌ Lokasi belum tersedia");
    return;
  }

  if (!validasiLokasi(lat, lon)) {
    alert("❌ Kamu di luar area kelas");
    return;
  }

  document.getElementById("status").innerText =
    "✅ Presensi berhasil!";

  console.log({
    nama,
    nim,
    lat,
    lon,
    foto,
    waktu: timestamp
  });
}
</script>

</body>
</html>
